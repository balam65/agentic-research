events:
  # ----------------------------------------------------
  # URL Discovery Events
  # ----------------------------------------------------
  - name: "url_discovered"
    emitted_by: "url_discovery"
    consumed_by: ["data_extractor"]
    payload_required_fields:
      - "source_agent_run_id"
      - "entity_id"
      - "discovered_url"
      - "domain_authority"
      - "confidence_score"
      - "justification"

  # ----------------------------------------------------
  # Extraction Events
  # ----------------------------------------------------
  - name: "extraction_completed"
    emitted_by: "data_extractor"
    consumed_by: ["orchestrator", "qa_validation"]
    payload_required_fields:
      - "source_agent_run_id"
      - "entity_id"
      - "extracted_data"
      - "schema_version"
      - "confidence_score"
      - "justification"
      
  - name: "extraction_failed"
    emitted_by: "data_extractor"
    consumed_by: ["orchestrator"]
    payload_required_fields:
      - "source_agent_run_id"
      - "entity_id"
      - "error_reason"
      - "confidence_score"
      - "justification"

  # ----------------------------------------------------
  # Scheduling Events
  # ----------------------------------------------------
  - name: "job_scheduled"
    emitted_by: "schedule_manager"
    consumed_by: ["url_discovery", "data_extractor"]
    payload_required_fields:
      - "source_agent_run_id"
      - "job_batch_id"
      - "priority_level"
      - "confidence_score"
      - "justification"
