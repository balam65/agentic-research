hitl_policies:
  # Universal escalations
  - event_match: "*"
    conditions:
      - "confidence_score < 0.80"
    escalation_action: "require_human_approval"
    sla_hours: 4

  # Capability specific rules
  - event_match: "url_discovered"
    thresholds:
      min_confidence: 0.70
    escalation_action: "require_user_approval_for_extraction"
    sla_hours: 4

  - event_match: "extraction_completed"
    thresholds:
      min_confidence: 0.85
    escalation_action: "require_qa_review"
    sla_hours: 2

  - event_match: "extraction_failed"
    escalation_action: "developer_notification"
    sla_hours: 1
